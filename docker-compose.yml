version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-backend-env: &backend-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DEBUG: ${DEBUG:-false}
  DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tsbl}
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
  DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-20}
  REDIS_URL: redis://:${REDIS_PASSWORD:-tsblredis}@redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
  JWT_ALGORITHM: HS256
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
  PASSWORD_BCRYPT_ROUNDS: ${PASSWORD_BCRYPT_ROUNDS:-12}
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","https://tsbl.com"]}
  SENTRY_DSN: ${SENTRY_DSN:-}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-in-production}
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-tsblredis}@redis:6379/1
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-tsblredis}@redis:6379/2
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@tsbl.com}

services:
  postgres:
    image: postgres:16-alpine
    container_name: tsbl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-tsbl}
      POSTGRES_INITDB_ARGS: "--data-checksums --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tsbl}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - tsbl-network

  redis:
    image: redis:7-alpine
    container_name: tsbl-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-tsblredis} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - tsbl-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tsbl-backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    volumes:
      - backend_media:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - tsbl-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tsbl-celery-worker
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: celery -A celery.worker:celery_app worker -l info -c 4 --max-tasks-per-child 200
    volumes:
      - backend_media:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery.worker:celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - tsbl-network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tsbl-celery-beat
    restart: unless-stopped
    environment:
      <<: *backend-env
    command: celery -A celery.worker:celery_app beat -l info --pidfile /tmp/celerybeat.pid
    volumes:
      - backend_media:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    logging: *default-logging
    networks:
      - tsbl-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tsbl-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - tsbl-network

  nginx:
    image: nginx:1.27-alpine
    container_name: tsbl-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    networks:
      - tsbl-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_media:
    driver: local
  backend_logs:
    driver: local

networks:
  tsbl-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
